.ip-lead{font-size:16px;line-height:1.75;color:#2c352f;margin:0 0 22px;max-width:48ch;}
.ip-goal-word{font-family:var(--fd);color:var(--red);font-weight:400;letter-spacing:.04em;}
.ip-saved{font-family:var(--fd);font-size:12px;letter-spacing:.12em;color:var(--muted);margin-bottom:16px;}
.ip-saved b{color:var(--ink);}
.ip-role-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
@media(max-width:560px){.ip-role-grid{grid-template-columns:1fr;}}
.ip-team-card{position:relative;text-align:left;border:none;border-radius:16px;padding:22px 20px 18px;cursor:pointer;color:#fff;overflow:hidden;transition:transform .16s ease,box-shadow .16s ease;}
.ip-team-card:hover{transform:translateY(-4px);box-shadow:0 18px 36px -18px rgba(0,0,0,.55);}
.ip-team-home{background:linear-gradient(150deg,#1f9a4d,#0f5f2e);}
.ip-team-away{background:linear-gradient(150deg,#222b27,#0B1411);}
.ip-team-no{font-family:var(--fd);font-size:42px;line-height:1;opacity:.32;position:absolute;top:10px;right:14px;}
.ip-team-role{display:block;font-family:var(--fd);font-size:26px;letter-spacing:.04em;}
.ip-team-jp{display:block;font-size:12px;opacity:.9;margin-top:4px;font-weight:500;}
.ip-fineprint{font-size:12px;color:var(--muted);line-height:1.6;margin:4px 0 0;}

/* ---- topbar ---- */
.ip-topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 0;border-bottom:2px solid var(--line);margin-bottom:18px;}
.ip-topbar-title{font-family:var(--fd);letter-spacing:.06em;font-size:17px;flex:1;text-align:center;}
.ip-tt-jp{font-family:var(--fb);font-weight:700;font-size:12px;color:var(--muted);margin-left:8px;letter-spacing:0;}
.ip-link{background:none;border:none;color:var(--grass-d);font-family:var(--fd);letter-spacing:.08em;font-size:13px;cursor:pointer;padding:6px 4px;}
.ip-link:disabled{color:var(--muted);opacity:.55;cursor:default;}
.ip-link:hover:not(:disabled){text-decoration:underline;}
.ip-link-light{color:rgba(255,255,255,.92);}

/* ---- fields ---- */
.ip-field{display:block;margin-bottom:16px;}
.ip-field-label{display:block;font-family:var(--fd);letter-spacing:.08em;font-size:11px;color:var(--muted);margin-bottom:6px;}
.ip-input{width:100%;background:var(--surface);border:2px solid var(--line);border-radius:11px;padding:11px 13px;font-family:var(--fb);font-size:15px;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s;}
.ip-input:focus{border-color:var(--grass);box-shadow:0 0 0 3px rgba(31,154,77,.16);}
.ip-input-lg{font-size:17px;padding:13px 15px;}
.ip-input-num{width:78px;}
.ip-textarea{resize:vertical;line-height:1.5;}

/* ---- setup list ---- */
.ip-setup{padding-bottom:24px;}
.ip-q-list{display:flex;flex-direction:column;gap:10px;margin:8px 0 18px;}
.ip-empty{display:flex;align-items:center;gap:14px;padding:26px;color:var(--muted);border:2px dashed var(--line);border-radius:14px;font-size:14px;}
.ip-q-item{display:flex;align-items:center;gap:14px;background:var(--surface);border:2px solid var(--line);border-radius:13px;padding:13px 16px;}
.ip-q-no{font-family:var(--fd);color:var(--grass-d);font-size:20px;min-width:34px;}
.ip-q-no-light{color:var(--gold);}
.ip-q-body{flex:1;min-width:0;}
.ip-q-text{font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ip-q-meta{font-family:var(--fd);font-size:11px;letter-spacing:.06em;color:var(--muted);margin-top:3px;}
.ip-q-actions{display:flex;gap:5px;}
.ip-icon{width:31px;height:31px;border:2px solid var(--line);background:#fff;border-radius:9px;cursor:pointer;color:var(--ink);font-size:13px;display:flex;align-items:center;justify-content:center;transition:.12s;}
.ip-icon:hover:not(:disabled){border-color:var(--grass);color:var(--grass-d);}
.ip-icon:disabled{opacity:.35;cursor:default;}
.ip-icon-red:hover:not(:disabled){border-color:var(--red);color:var(--red);}
.ip-add-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ip-add-label{font-family:var(--fd);letter-spacing:.08em;font-size:12px;color:var(--muted);margin-right:2px;}
.ip-chip{display:inline-flex;align-items:center;gap:6px;background:var(--ink);color:#fff;border:2px solid var(--ink);border-radius:999px;padding:8px 15px;font-family:var(--fd);letter-spacing:.04em;font-size:14px;cursor:pointer;transition:.14s;}
.ip-chip:hover{background:var(--grass-d);border-color:var(--grass-d);}
.ip-chip-jp{font-family:var(--fb);font-weight:700;font-size:11px;opacity:.85;}
.ip-chip-ghost{background:#fff;color:var(--grass-d);border-color:var(--line);}
.ip-chip-ghost:hover{background:#fff;border-color:var(--grass);}

/* ---- editor ---- */
.ip-editor{background:var(--surface);border:2px solid var(--grass);border-radius:15px;padding:18px;margin:4px 0 8px;box-shadow:0 14px 36px -22px rgba(15,95,46,.7);}
.ip-editor-type{font-family:var(--fd);letter-spacing:.05em;font-size:14px;color:var(--grass-d);}
.ip-editor-head{margin-bottom:10px;}
.ip-options{margin-top:12px;display:flex;flex-direction:column;gap:8px;}
.ip-opt-row{display:flex;align-items:center;gap:8px;}
.ip-jersey{flex:none;width:30px;height:30px;border-radius:8px;background:var(--ink);color:#fff;font-family:var(--fd);font-size:15px;display:flex;align-items:center;justify-content:center;}
.ip-jersey-sm{width:24px;height:24px;font-size:12px;border-radius:6px;}
.ip-scale-cfg{margin-top:12px;}
.ip-scale-range{display:flex;gap:20px;margin-bottom:12px;}
.ip-scale-range label{font-family:var(--fd);letter-spacing:.06em;font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:5px;}
.ip-editor-foot{display:flex;justify-content:space-between;align-items:center;margin-top:16px;}

/* ---- buttons ---- */
.ip-btn-primary{background:var(--grass);color:#fff;border:none;border-radius:11px;padding:11px 20px;font-family:var(--fd);letter-spacing:.04em;font-size:15px;cursor:pointer;transition:.15s;}
.ip-btn-primary:hover:not(:disabled){background:var(--grass-dd);}
.ip-btn-primary:disabled{background:#a9c4b3;cursor:default;}
.ip-btn-block{width:100%;margin-top:10px;padding:15px;font-size:17px;}
.ip-start-bar{margin-top:26px;padding-top:22px;border-top:2px solid var(--line);text-align:center;}
.ip-start-bar .ip-fineprint{text-align:center;margin-top:10px;}
.ip-kickoff{display:inline-flex;align-items:center;gap:10px;background:var(--gold);color:var(--ink);border:none;border-radius:14px;padding:16px 30px;font-family:var(--fd);letter-spacing:.06em;font-size:19px;cursor:pointer;box-shadow:0 10px 24px -10px rgba(216,164,23,.8);transition:.14s;}
.ip-kickoff:hover:not(:disabled){transform:translateY(-2px);background:#ffd23f;}
.ip-kickoff:disabled{background:#e7e0c4;color:#9a9686;cursor:default;box-shadow:none;}

/* ===== PRESENTER STAGE ===== */
.ip-stage-wrap{min-height:100vh;}
.ip-stage-inner{position:relative;z-index:2;max-width:1180px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:0 22px 18px;}
.ip-scoreboard{display:flex;justify-content:space-between;align-items:center;margin-top:16px;background:rgba(11,20,17,.9);border-radius:14px;padding:12px 18px;color:#fff;box-shadow:0 10px 30px -14px rgba(0,0,0,.6);}
.ip-sb-left{display:flex;align-items:center;gap:16px;}
.ip-live{display:inline-flex;align-items:center;gap:7px;background:var(--red);color:#fff;font-family:var(--fd);letter-spacing:.12em;font-size:12px;padding:5px 10px;border-radius:7px;}
.ip-live-sm{font-size:10px;padding:3px 7px;}
.ip-livedot{width:7px;height:7px;border-radius:50%;background:#fff;animation:ip-pulse 1.3s infinite;}
@keyframes ip-pulse{0%,100%{opacity:1;}50%{opacity:.2;}}
.ip-sb-q{font-family:var(--fd);letter-spacing:.06em;font-size:16px;color:rgba(255,255,255,.75);}
.ip-sb-q b{color:var(--gold);font-size:22px;margin:0 2px;}
.ip-sb-slash{opacity:.5;margin:0 4px;}
.ip-sb-right{display:flex;align-items:center;gap:18px;}
.ip-sb-count{display:flex;flex-direction:column;align-items:flex-end;line-height:1;}
.ip-sb-count-num{font-family:var(--fd);font-size:30px;color:var(--gold);font-variant-numeric:tabular-nums;}
.ip-sb-count-lbl{font-family:var(--fd);letter-spacing:.14em;font-size:9px;color:rgba(255,255,255,.6);}

.ip-stage{flex:1;display:flex;flex-direction:column;justify-content:center;padding:26px 0;}
.ip-stage-q{width:100%;background:rgba(255,255,255,.95);border-radius:20px;padding:34px 34px 30px;box-shadow:0 26px 60px -30px rgba(0,0,0,.6);animation:ip-kick .5s cubic-bezier(.2,.8,.2,1);}
@keyframes ip-kick{0%{transform:translateY(26px) scale(.97);opacity:0;}100%{transform:none;opacity:1;}}
.ip-stage-qtext{font-weight:900;font-size:clamp(24px,3.8vw,40px);line-height:1.22;margin-bottom:28px;color:var(--ink);}

/* waiting (coach) */
.ip-waiting-stage{background:rgba(255,255,255,.95);border-radius:20px;padding:30px;box-shadow:0 26px 60px -30px rgba(0,0,0,.6);}
.ip-waiting-head{display:flex;gap:20px;align-items:center;margin-bottom:22px;}
.ip-h2{font-weight:900;font-size:clamp(18px,2.8vw,24px);margin:2px 0 4px;}
.ip-muted-light{color:var(--muted);font-size:13px;}
.ip-lineup{display:flex;flex-direction:column;gap:10px;}
.ip-lineup-item{display:flex;align-items:center;gap:14px;text-align:left;background:#fff;border:2px solid var(--line);border-radius:12px;padding:13px 16px;cursor:pointer;transition:.14s;}
.ip-lineup-item:hover{border-color:var(--grass);transform:translateX(4px);}
.ip-lineup-text{flex:1;font-weight:500;}
.ip-lineup-type{font-family:var(--fd);font-size:11px;letter-spacing:.05em;color:var(--muted);}

/* controls */
.ip-controls{display:flex;align-items:center;gap:12px;padding-top:8px;}
.ip-ctrl{flex:none;background:rgba(255,255,255,.95);border:none;border-radius:12px;padding:14px 22px;font-family:var(--fd);letter-spacing:.05em;font-size:15px;cursor:pointer;color:var(--ink);box-shadow:0 8px 20px -12px rgba(0,0,0,.5);transition:.14s;}
.ip-ctrl:hover:not(:disabled){transform:translateY(-2px);}
.ip-ctrl:disabled{opacity:.4;cursor:default;}
.ip-ctrl-toggle{flex:1;font-family:var(--fb);font-weight:700;font-size:13px;color:var(--muted);background:rgba(255,255,255,.78);}
.ip-ctrl-toggle[data-on="true"]{color:var(--grass-dd);}
.ip-ctrl-go{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:var(--ink);margin-left:auto;}
.ip-ctrl-go:hover{background:#ffd23f;}
.ip-ctrl-end{background:var(--ink);color:#fff;margin-left:auto;}

/* ===== PLAYER (join) ===== */
.ip-join{max-width:560px;margin:0 auto;min-height:100vh;}
.ip-join-top{border-radius:0 0 18px 18px;padding:14px 18px 16px;margin-bottom:18px;}
.ip-join-top .ip-lines{opacity:.6;}
.ip-join-top-row{position:relative;z-index:2;display:flex;align-items:center;gap:10px;}
.ip-join-title{flex:1;font-family:var(--fd);letter-spacing:.05em;font-size:15px;color:#fff;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ip-join-body{padding:6px 18px 50px;}
.ip-join-wait{text-align:center;padding:42px 0;}
.ip-cheer{font-family:var(--fd);letter-spacing:.05em;font-size:24px;color:var(--grass-d);margin:18px 0 6px;animation:ip-fade .5s;}
@keyframes ip-fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;}}
.ip-join-no{font-family:var(--fd);letter-spacing:.08em;font-size:13px;color:var(--grass-d);margin-bottom:10px;}
.ip-join-qtext{font-weight:900;font-size:clamp(20px,5.4vw,26px);line-height:1.32;margin:0 0 22px;}
.ip-answer-choices{display:flex;flex-direction:column;gap:11px;}
.ip-answer-btn{display:flex;align-items:center;gap:13px;text-align:left;background:var(--surface);border:2.5px solid var(--line);border-radius:14px;padding:15px 16px;font-family:var(--fb);font-size:16px;font-weight:500;color:var(--ink);cursor:pointer;transition:.14s;}
.ip-answer-btn:hover{border-color:var(--grass);}
.ip-answer-btn:active{transform:scale(.99);}
.ip-answer-text{flex:1;}
.ip-answer-kick{opacity:0;transform:translateX(-6px);transition:.16s;font-size:18px;}
.ip-answer-btn:hover .ip-answer-kick{opacity:1;transform:translateX(0);}
.ip-scale-answer{margin-top:4px;}
.ip-scale-btns{display:flex;gap:8px;}
.ip-scale-btn{flex:1;aspect-ratio:1;background:var(--surface);border:2.5px solid var(--line);border-radius:13px;font-family:var(--fd);font-size:22px;color:var(--ink);cursor:pointer;transition:.14s;}
.ip-scale-btn:hover{border-color:var(--grass);}
.ip-scale-btn:active{transform:scale(.94);background:var(--grass);color:#fff;}
.ip-scale-ends{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--muted);}
.ip-text-answer{margin-top:4px;}
.ip-thanks{display:flex;flex-direction:column;align-items:center;gap:8px;padding:30px 0;text-align:center;}
.ip-thanks-badge{animation:ip-pop .4s cubic-bezier(.2,1.6,.4,1);}
@keyframes ip-pop{from{transform:scale(0);}to{transform:scale(1);}}
.ip-thanks-en{font-family:var(--fd);letter-spacing:.06em;font-size:22px;color:var(--grass-d);}
.ip-thanks-jp{font-weight:500;font-size:14px;color:var(--muted);}
.ip-join-results{margin-top:28px;padding-top:20px;border-top:2px solid var(--line);}
.ip-results-label{font-family:var(--fd);letter-spacing:.06em;font-size:12px;color:var(--muted);margin-bottom:14px;}

/* ===== results bars ===== */
.ip-results{display:flex;flex-direction:column;gap:12px;}
.ip-bar-row{display:flex;flex-direction:column;gap:7px;}
.ip-bar-main{display:flex;align-items:center;gap:14px;}
.ip-results-big .ip-bar-main{gap:18px;}
.ip-bar-label{display:flex;align-items:center;gap:8px;width:30%;max-width:260px;min-width:84px;}
.ip-bar-text{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ip-results-big .ip-bar-text{font-size:19px;}
.ip-bar-track{flex:1;position:relative;height:38px;background:#e7ede8;border-radius:9px;overflow:hidden;display:flex;align-items:center;}
.ip-results-big .ip-bar-track{height:52px;}
.ip-bar-fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--grass-dd),var(--grass));border-radius:9px;transition:width .7s cubic-bezier(.2,.8,.2,1);}
.ip-bar-val{position:relative;margin-left:auto;padding:0 14px;font-family:var(--fd);font-size:16px;color:var(--ink);font-variant-numeric:tabular-nums;}
.ip-results-big .ip-bar-val{font-size:21px;}
.ip-bar-count{color:var(--muted);font-size:.78em;}
.ip-avg{font-family:var(--fd);letter-spacing:.06em;font-size:14px;color:var(--muted);margin-bottom:6px;display:flex;align-items:baseline;gap:8px;}
.ip-avg-num{color:var(--grass-d);font-size:32px;font-variant-numeric:tabular-nums;}
.ip-avg-ends{font-family:var(--fb);font-weight:500;font-size:12px;letter-spacing:0;}
.ip-text-results{display:flex;flex-direction:column;gap:10px;max-height:46vh;overflow:auto;}
.ip-text-big{max-height:52vh;}
.ip-text-card{background:#fff;border:2px solid var(--line);border-left:4px solid var(--grass);border-radius:11px;padding:13px 16px;font-size:15px;line-height:1.55;white-space:pre-wrap;word-break:break-word;}
.ip-text-big .ip-text-card{font-size:18px;}
.ip-text-name{display:block;font-family:var(--fd);letter-spacing:.04em;font-size:12px;color:var(--grass-d);margin-bottom:4px;}
.ip-text-big .ip-text-name{font-size:14px;}
.ip-text-body{display:block;}
.ip-text-empty{padding:24px 0;}

/* name chips under bars */
.ip-names{display:flex;flex-wrap:wrap;gap:5px;padding-left:calc(30% + 14px);}
.ip-results-big .ip-names{padding-left:0;}
.ip-name-chip{background:#eef4ef;border:1px solid var(--line);color:var(--grass-dd);font-size:12px;font-weight:500;padding:2px 9px;border-radius:999px;}
.ip-results-big .ip-name-chip{font-size:14px;padding:3px 11px;}

/* my name badge */
.ip-myname{font-family:var(--fb);font-weight:700;font-size:12px;color:#fff;background:rgba(0,0,0,.28);padding:4px 10px;border-radius:999px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* registration */
.ip-reg{text-align:center;padding:18px 0 40px;}
.ip-reg-jersey{position:relative;width:140px;height:158px;margin:8px auto 22px;background:linear-gradient(160deg,#1f9a4d,#0f5f2e);border-radius:14px 14px 8px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;box-shadow:0 16px 34px -18px rgba(15,95,46,.8);clip-path:polygon(0 14%,18% 0,38% 8%,62% 8%,82% 0,100% 14%,100% 100%,0 100%);}
.ip-reg-jersey-no{font-family:var(--fd);font-size:62px;line-height:1;}
.ip-reg-jersey-name{font-family:var(--fd);letter-spacing:.06em;font-size:13px;margin-top:6px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 8px;}
.ip-reg-input{text-align:center;margin:16px 0 4px;}

/* ===== ball / bounce / goal ===== */
.ip-ball{display:block;}
.ip-ball-spin{animation:ip-spin 1.1s linear infinite;}
@keyframes ip-spin{to{transform:rotate(360deg);}}
.ip-bounce{position:relative;width:70px;height:80px;}
.ip-bounce-big{width:90px;height:100px;margin:0 auto;}
.ip-bounce-ball{animation:ip-bounce 1s cubic-bezier(.3,0,.4,1) infinite;}
@keyframes ip-bounce{0%,100%{transform:translateY(-26px) rotate(0);}50%{transform:translateY(6px) rotate(180deg);}}
.ip-bounce-shadow{position:absolute;left:50%;bottom:4px;width:46px;height:9px;background:rgba(0,0,0,.18);border-radius:50%;transform:translateX(-50%);animation:ip-shadow 1s cubic-bezier(.3,0,.4,1) infinite;}
@keyframes ip-shadow{0%,100%{transform:translateX(-50%) scale(.7);opacity:.4;}50%{transform:translateX(-50%) scale(1.1);opacity:.8;}}

.ip-goal-overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.ip-goal-burst{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:6px;animation:ip-goalpop .5s cubic-bezier(.2,1.5,.4,1) both;}
@keyframes ip-goalpop{0%{transform:scale(.2);opacity:0;}60%{transform:scale(1.12);opacity:1;}100%{transform:scale(1);}}
.ip-goal-ball{animation:ip-spin .6s linear infinite;}
.ip-goal-text{font-family:var(--fd);font-size:clamp(52px,14vw,108px);color:var(--gold);letter-spacing:.04em;text-shadow:0 6px 0 var(--grass-dd),0 12px 30px rgba(0,0,0,.4);-webkit-text-stroke:2px var(--ink);}
.ip-goal-sub{font-family:var(--fd);letter-spacing:.1em;font-size:18px;color:#fff;background:var(--red);padding:5px 16px;border-radius:8px;}
.ip-confetti{position:absolute;inset:0;overflow:hidden;}
.ip-confetto{position:absolute;top:-20px;animation-name:ip-fall;animation-timing-function:cubic-bezier(.3,.1,.6,1);animation-fill-mode:both;}
@keyframes ip-fall{0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(105vh) rotate(680deg);opacity:.9;}}

@media (prefers-reduced-motion: reduce){
  .ip-root *{animation:none!important;transition:none!important;}
  .ip-confetto{display:none;}
}
