<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;


/* ================================================================== *
 *  INQUIRY PITCH — ゼミ用ライブアンケート（探究 × 英語 × サッカー）
 *  - COACH(発表者): 問いを準備し、KICK OFF → NEXT で1問ずつ提示
 *  - PLAYER(参加者): 端末で回答 → GOAL演出 → 結果がリアルタイム集計
 *  - 同期: Firebase Realtime Database。config と votes をリアルタイム購読。
 * ================================================================== */

/* ---------- Firebase (Realtime Database) ---------- */
const firebaseConfig = window.__FIREBASE_CONFIG__ || {};
const CONFIG_OK = !!(firebaseConfig.databaseURL && !/REPLACE_ME/.test(firebaseConfig.databaseURL));
let db = null;
if (CONFIG_OK) {
  try { firebase.initializeApp(firebaseConfig); db = firebase.database(); }
  catch (e) { console.error("Firebase init failed", e); }
}

const uid = () => Math.random().toString(36).slice(2, 10);

function emptyConfig() {
  return { sessionId: uid(), title: "", questions: [], activeIndex: -1, revealResults: true, started: false };
}

// undefined を含むとRTDBが拒否するため JSON で正規化
const clean = (o) => JSON.parse(JSON.stringify(o));

function listenConfig(cb) {
  if (!db) { cb(null); return () => {}; }
  const ref = db.ref("config");
  const h = ref.on("value", (s) => cb(s.val()));
  return () => ref.off("value", h);
}
function writeConfig(next) { if (db) db.ref("config").set(clean(next)); }

function normalizeVotes(obj) {
  const o = obj || {};
  return Object.keys(o).map((k) => o[k])
    .map((x) => (x && typeof x === "object" && "a" in x) ? { a: x.a, n: x.n || "" } : { a: x, n: "" })
    .filter((x) => x.a !== null && x.a !== undefined);
}
function listenVotes(sid, qi, cb) {
  if (!db) { cb([]); return () => {}; }
  const ref = db.ref("votes/" + sid + "/" + qi);
  const h = ref.on("value", (s) => cb(normalizeVotes(s.val())));
  return () => ref.off("value", h);
}
function writeVote(sid, qi, pid, val) { if (db) db.ref("votes/" + sid + "/" + qi + "/" + pid).set(clean(val)); }

/* ================================================================== */
function App() {
  const [view, setView] = useState("role");
  const [config, setConfig] = useState(null);
  const [loading, setLoading] = useState(true);
  const pidRef = useRef(uid());

  useEffect(() => {
    const off = listenConfig((c) => { setConfig(c); setLoading(false); });
    return off;
  }, []);

  const pushConfig = useCallback((next) => {
    setConfig(next);
    writeConfig(next);
  }, []);

  if (!CONFIG_OK) {
    return (<div className="ip-root"><StyleTag /><ConfigNotice /></div>);
  }

  return (
    <div className="ip-root">
      <StyleTag />
      {loading ? (
        <div className="ip-center"><SoccerBall spin /> <span className="ip-loading">LOADING…</span></div>
      ) : view === "role" ? (
        <RoleSelect
          hasPoll={!!(config && config.questions && config.questions.length)}
          title={config && config.title}
          onCoach={() => setView("setup")}
          onPlayer={() => setView("join")}
        />
      ) : view === "setup" ? (
        <Setup
          config={config || emptyConfig()}
          onCancel={() => setView("role")}
          onSave={async (c) => { await pushConfig(c); }}
          onStart={async (c) => {
            const next = { ...c, sessionId: uid(), started: true, activeIndex: -1 };
            await pushConfig(next); setView("present");
          }}
        />
      ) : view === "present" ? (
        <Presenter config={config} pushConfig={pushConfig}
          onExit={() => setView("role")} onEdit={() => setView("setup")} />
      ) : (
        <Participant config={config} pid={pidRef.current} onLeave={() => setView("role")} />
      )}
    </div>
  );
}

/* ===================== SOCCER BALL (svg) ===================== */
function SoccerBall({ spin, className = "", size = 64 }) {
  return (
    <svg className={`ip-ball ${spin ? "ip-ball-spin" : ""} ${className}`}
      width={size} height={size} viewBox="0 0 100 100" aria-hidden="true">
      <circle cx="50" cy="50" r="47" fill="#fff" stroke="#0B1411" strokeWidth="2.5" />
      <polygon points="50,34 64,44 58.5,61 41.5,61 36,44" fill="#0B1411" />
      <g stroke="#0B1411" strokeWidth="2.4" fill="none">
        <path d="M50 34 L50 9" /><path d="M64 44 L86 32" /><path d="M58.5 61 L72 84" />
        <path d="M41.5 61 L28 84" /><path d="M36 44 L14 32" />
      </g>
    </svg>
  );
}

/* ===================== ROLE SELECT ===================== */
function RoleSelect({ hasPoll, title, onCoach, onPlayer }) {
  return (
    <div className="ip-center ip-pitch ip-pitch-full">
      <PitchLines />
      <div className="ip-hero">
        <div className="ip-eyebrow">FIFA-STYLE LIVE POLL · 探究 × 英語</div>
        <h1 className="ip-h1"><span className="ip-h1-en">INQUIRY</span><span className="ip-h1-jp">問いを、キックオフ。</span></h1>
        <p className="ip-lead">
          スライドに合わせて「問い」を1問ずつピッチに送り出し、メンバーの回答をリアルタイムで集計。
          答えるたびに <b className="ip-goal-word">GOAL!</b> が決まります。
        </p>
        {hasPoll && title ? <div className="ip-saved">SAVED&nbsp; <b>{title || "Untitled"}</b></div> : null}
        <div className="ip-role-grid">
          <button className="ip-team-card ip-team-home" onClick={onCoach}>
            <span className="ip-team-no">10</span>
            <span className="ip-team-role">COACH</span>
            <span className="ip-team-jp">発表者 — 問いを準備して進行</span>
          </button>
          <button className="ip-team-card ip-team-away" onClick={onPlayer}>
            <span className="ip-team-no">07</span>
            <span className="ip-team-role">PLAYER</span>
            <span className="ip-team-jp">参加者 — この端末で回答</span>
          </button>
        </div>
        <p className="ip-fineprint">
          PLAYER はこのページのURLを開くだけで参加できます。回答は匿名で、開いた全員と共有されます。
        </p>
      </div>
    </div>
  );
}

function PitchLines() {
  return (
    <div className="ip-lines" aria-hidden="true">
      <div className="ip-line-half" />
      <div className="ip-circle-center" />
      <div className="ip-spot" />
      <div className="ip-box ip-box-l" /><div className="ip-box ip-box-r" />
    </div>
  );
}

/* ===================== SETUP (COACH) ===================== */
const QTYPES = [
  { id: "choice", label: "選択式", en: "Choice" },
  { id: "scale", label: "段階評価", en: "Scale" },
  { id: "text", label: "自由記述", en: "Open" },
];

function Setup({ config, onCancel, onSave, onStart }) {
  const [title, setTitle] = useState(config.title || "");
  const [questions, setQuestions] = useState(config.questions || []);
  const [editing, setEditing] = useState(null);
  const current = { ...config, title, questions };

  const startDraft = (type) =>
    setEditing(
      type === "scale"
        ? { id: uid(), type, text: "", scaleMin: 1, scaleMax: 5, minLabel: "Strongly disagree", maxLabel: "Strongly agree" }
        : type === "choice"
        ? { id: uid(), type, text: "", options: ["", ""] }
        : { id: uid(), type, text: "" }
    );

  const commitDraft = (q) => {
    setQuestions((prev) => {
      const i = prev.findIndex((x) => x.id === q.id);
      if (i >= 0) { const c = [...prev]; c[i] = q; return c; }
      return [...prev, q];
    });
    setEditing(null);
  };
  const move = (i, dir) =>
    setQuestions((prev) => {
      const j = i + dir; if (j < 0 || j >= prev.length) return prev;
      const c = [...prev]; [c[i], c[j]] = [c[j], c[i]]; return c;
    });

  return (
    <div className="ip-page">
      <header className="ip-topbar">
        <button className="ip-link" onClick={onCancel}>← BACK</button>
        <div className="ip-topbar-title">MATCH SETUP <span className="ip-tt-jp">問いの準備</span></div>
        <button className="ip-link" onClick={() => onSave(current)} disabled={!questions.length}>SAVE</button>
      </header>

      <div className="ip-setup">
        <label className="ip-field">
          <span className="ip-field-label">TITLE / タイトル（任意）</span>
          <input className="ip-input ip-input-lg" value={title}
            placeholder="例）Inquiry-based English Learning"
            onChange={(e) => setTitle(e.target.value)} />
        </label>

        <div className="ip-q-list">
          {questions.length === 0 && !editing ? (
            <div className="ip-empty"><SoccerBall size={34} /><span>まだ問いがありません。下のボタンで最初の問いをキックオフ。</span></div>
          ) : null}
          {questions.map((q, i) => (
            <div className="ip-q-item" key={q.id}>
              <div className="ip-q-no">{String(i + 1).padStart(2, "0")}</div>
              <div className="ip-q-body">
                <div className="ip-q-text">{q.text || <em className="ip-muted">（問いが未入力）</em>}</div>
                <div className="ip-q-meta">{typeLabel(q)}</div>
              </div>
              <div className="ip-q-actions">
                <button className="ip-icon" title="上へ" onClick={() => move(i, -1)} disabled={i === 0}>↑</button>
                <button className="ip-icon" title="下へ" onClick={() => move(i, 1)} disabled={i === questions.length - 1}>↓</button>
                <button className="ip-icon" title="編集" onClick={() => setEditing(q)}>✎</button>
                <button className="ip-icon ip-icon-red" title="削除"
                  onClick={() => setQuestions((p) => p.filter((x) => x.id !== q.id))}>✕</button>
              </div>
            </div>
          ))}
        </div>

        {editing ? (
          <QuestionEditor draft={editing} onCancel={() => setEditing(null)} onCommit={commitDraft} />
        ) : (
          <div className="ip-add-row">
            <span className="ip-add-label">ADD INQUIRY</span>
            {QTYPES.map((t) => (
              <button key={t.id} className="ip-chip" onClick={() => startDraft(t.id)}>
                + {t.en}<span className="ip-chip-jp">{t.label}</span>
              </button>
            ))}
          </div>
        )}

        <div className="ip-start-bar">
          <button className="ip-kickoff" disabled={!questions.length || !!editing} onClick={() => onStart(current)}>
            <SoccerBall size={26} /> KICK OFF — 発表を開始
          </button>
          <p className="ip-fineprint">開始すると新しい試合（セッション）が始まり、回答がリセットされます。</p>
        </div>
      </div>
    </div>
  );
}

function typeLabel(q) {
  if (q.type === "choice") return `Choice · ${(q.options || []).filter(Boolean).length}択`;
  if (q.type === "scale") return `Scale · ${q.scaleMin}–${q.scaleMax}`;
  return "Open response · 自由記述";
}

function QuestionEditor({ draft, onCancel, onCommit }) {
  const [q, setQ] = useState(draft);
  const set = (patch) => setQ((p) => ({ ...p, ...patch }));
  const valid = q.text.trim() &&
    (q.type !== "choice" || (q.options || []).filter((o) => o.trim()).length >= 2);

  return (
    <div className="ip-editor">
      <div className="ip-editor-head">
        <span className="ip-editor-type">{QTYPES.find((t) => t.id === q.type)?.en} · {QTYPES.find((t) => t.id === q.type)?.label}</span>
      </div>
      <textarea className="ip-input ip-textarea" placeholder="問いを入力（英語でもOK）"
        value={q.text} onChange={(e) => set({ text: e.target.value })} rows={2} autoFocus />

      {q.type === "choice" && (
        <div className="ip-options">
          {(q.options || []).map((opt, i) => (
            <div className="ip-opt-row" key={i}>
              <span className="ip-jersey">{String.fromCharCode(65 + i)}</span>
              <input className="ip-input" placeholder={`Option ${i + 1}`} value={opt}
                onChange={(e) => { const o = [...q.options]; o[i] = e.target.value; set({ options: o }); }} />
              {q.options.length > 2 && (
                <button className="ip-icon ip-icon-red"
                  onClick={() => set({ options: q.options.filter((_, j) => j !== i) })}>✕</button>
              )}
            </div>
          ))}
          {q.options.length < 8 && (
            <button className="ip-chip ip-chip-ghost" onClick={() => set({ options: [...q.options, ""] })}>+ 選択肢を追加</button>
          )}
        </div>
      )}

      {q.type === "scale" && (
        <div className="ip-scale-cfg">
          <div className="ip-scale-range">
            <label>MIN<input className="ip-input ip-input-num" type="number" value={q.scaleMin}
              onChange={(e) => set({ scaleMin: clampInt(e.target.value, 0, 9, 1) })} /></label>
            <label>MAX<input className="ip-input ip-input-num" type="number" value={q.scaleMax}
              onChange={(e) => set({ scaleMax: clampInt(e.target.value, 2, 10, 5) })} /></label>
          </div>
          <label className="ip-field"><span className="ip-field-label">左端ラベル</span>
            <input className="ip-input" value={q.minLabel || ""} onChange={(e) => set({ minLabel: e.target.value })} /></label>
          <label className="ip-field"><span className="ip-field-label">右端ラベル</span>
            <input className="ip-input" value={q.maxLabel || ""} onChange={(e) => set({ maxLabel: e.target.value })} /></label>
        </div>
      )}

      <div className="ip-editor-foot">
        <button className="ip-link" onClick={onCancel}>CANCEL</button>
        <button className="ip-btn-primary" disabled={!valid}
          onClick={() => onCommit({ ...q, options: q.options ? q.options.filter((o) => o.trim()) : undefined })}>
          この問いを保存
        </button>
      </div>
    </div>
  );
}
function clampInt(v, min, max, fb) { const n = parseInt(v, 10); return Number.isNaN(n) ? fb : Math.max(min, Math.min(max, n)); }

/* ===================== PRESENTER (COACH live) ===================== */
function Presenter({ config, pushConfig, onExit, onEdit }) {
  const [votes, setVotes] = useState([]);
  const qs = config.questions || [];
  const ai = config.activeIndex;
  const q = ai >= 0 && ai < qs.length ? qs[ai] : null;

  useEffect(() => {
    if (ai < 0) { setVotes([]); return; }
    return listenVotes(config.sessionId, ai, setVotes);
  }, [ai, config.sessionId]);

  const go = (dir) => pushConfig({ ...config, activeIndex: Math.max(-1, Math.min(qs.length - 1, ai + dir)) });
  const jumpTo = (i) => pushConfig({ ...config, activeIndex: i });
  const toggleReveal = () => pushConfig({ ...config, revealResults: !config.revealResults });
  const atEnd = ai >= qs.length - 1;

  return (
    <div className="ip-stage-wrap ip-pitch">
      <PitchLines />
      <div className="ip-stage-inner">
        <header className="ip-scoreboard">
          <div className="ip-sb-left">
            <span className="ip-live"><i className="ip-livedot" />LIVE</span>
            <span className="ip-sb-q">{ai < 0 ? "WARM-UP" : <>INQUIRY <b>{String(ai + 1).padStart(2, "0")}</b><span className="ip-sb-slash">/</span>{String(qs.length).padStart(2, "0")}</>}</span>
          </div>
          <div className="ip-sb-right">
            <div className="ip-sb-count"><span className="ip-sb-count-num">{votes.length}</span><span className="ip-sb-count-lbl">RESPONSES</span></div>
            <button className="ip-link ip-link-light" onClick={onEdit}>EDIT</button>
            <button className="ip-link ip-link-light" onClick={onExit}>EXIT</button>
          </div>
        </header>

        <main className="ip-stage">
          {ai < 0 ? (
            <WaitingStage qs={qs} onPick={jumpTo} />
          ) : (
            <div className="ip-stage-q" key={ai}>
              <div className="ip-stage-qtext">{q.text}</div>
              <Results q={q} votes={votes} big />
            </div>
          )}
        </main>

        <footer className="ip-controls">
          <button className="ip-ctrl" onClick={() => go(-1)} disabled={ai < 0}>← PREV</button>
          <button className="ip-ctrl ip-ctrl-toggle" data-on={config.revealResults} onClick={toggleReveal}>
            {config.revealResults ? "結果を全員に表示中 👁" : "結果は伏せています ◓"}
          </button>
          {ai < 0 ? (
            <button className="ip-ctrl ip-ctrl-go" onClick={() => go(1)}><SoccerBall size={20} /> KICK OFF</button>
          ) : atEnd ? (
            <button className="ip-ctrl ip-ctrl-end" onClick={() => jumpTo(-1)}>FULL TIME 🏁</button>
          ) : (
            <button className="ip-ctrl ip-ctrl-go" onClick={() => go(1)}>NEXT →</button>
          )}
        </footer>
      </div>
    </div>
  );
}

function WaitingStage({ qs, onPick }) {
  return (
    <div className="ip-waiting-stage">
      <div className="ip-waiting-head">
        <BouncingBall />
        <div>
          <div className="ip-eyebrow ip-eyebrow-light">TEAM TALK</div>
          <h2 className="ip-h2">PLAYERの準備ができたら、問いをキックオフ</h2>
          <p className="ip-muted-light">NEXT で順番に進むか、下の問いを直接クリック。</p>
        </div>
      </div>
      <div className="ip-lineup">
        {qs.map((q, i) => (
          <button className="ip-lineup-item" key={q.id} onClick={() => onPick(i)}>
            <span className="ip-q-no ip-q-no-light">{String(i + 1).padStart(2, "0")}</span>
            <span className="ip-lineup-text">{q.text}</span>
            <span className="ip-lineup-type">{typeLabel(q)}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

/* ===================== PARTICIPANT (PLAYER) ===================== */
const CHEERS = ["Ready to play?", "Think in English!", "Your idea matters.", "Take a shot!", "No wrong answers."];

function Participant({ config, pid, onLeave }) {
  const [nickname, setNickname] = useState("");
  const [nameDraft, setNameDraft] = useState("");
  const [answers, setAnswers] = useState({});
  const [textDraft, setTextDraft] = useState("");
  const [votes, setVotes] = useState([]);
  const [goalKey, setGoalKey] = useState(0);
  const [showGoal, setShowGoal] = useState(false);
  const [cheer, setCheer] = useState(0);

  useEffect(() => { const t = setInterval(() => setCheer((c) => (c + 1) % CHEERS.length), 2600); return () => clearInterval(t); }, []);

  const ai = config ? config.activeIndex : -1;
  const qs = config ? config.questions || [] : [];
  const q = ai >= 0 && ai < qs.length ? qs[ai] : null;
  const sid = config ? config.sessionId : "";
  const answered = answers[`${sid}:${ai}`] !== undefined;

  useEffect(() => {
    if (!config || !config.revealResults || ai < 0) { setVotes([]); return; }
    return listenVotes(sid, ai, setVotes);
  }, [config && config.revealResults, ai, sid]);

  useEffect(() => { setTextDraft(""); }, [ai, sid]);

  const submit = async (value) => {
    setAnswers((p) => ({ ...p, [`${sid}:${ai}`]: value }));
    setGoalKey((k) => k + 1); setShowGoal(true);
    setTimeout(() => setShowGoal(false), 1900);
    writeVote(sid, ai, pid, { a: value, n: nickname });
  };

  if (!config) return <div className="ip-center"><SoccerBall spin /><span className="ip-loading">CONNECTING…</span></div>;

  // ニックネーム未登録なら登録ゲートを表示
  if (!nickname) {
    const can = nameDraft.trim().length > 0;
    const register = () => { const n = nameDraft.trim().slice(0, 16); if (n) setNickname(n); };
    return (
      <div className="ip-join">
        <header className="ip-join-top ip-pitch">
          <PitchLines compact />
          <div className="ip-join-top-row">
            <span className="ip-join-title">{config.title || "INQUIRY PITCH"}</span>
            <button className="ip-link ip-link-light" onClick={onLeave}>EXIT</button>
          </div>
        </header>
        <div className="ip-join-body">
          <div className="ip-reg">
            <div className="ip-reg-jersey">
              <span className="ip-reg-jersey-no">07</span>
              <span className="ip-reg-jersey-name">{nameDraft.trim().slice(0, 16).toUpperCase() || "YOUR NAME"}</span>
            </div>
            <div className="ip-eyebrow">PLAYER REGISTRATION · 選手登録</div>
            <h2 className="ip-join-qtext">ニックネームを入力</h2>
            <p className="ip-muted">回答に表示される名前です（あとから変えられません）。</p>
            <input className="ip-input ip-input-lg ip-reg-input" value={nameDraft} maxLength={16}
              placeholder="例）はると / Haruto"
              onChange={(e) => setNameDraft(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") register(); }} autoFocus />
            <button className="ip-btn-primary ip-btn-block" disabled={!can} onClick={register}>
              JOIN THE PITCH 参加する
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="ip-join">
      {showGoal && <GoalOverlay key={goalKey} name={nickname} />}
      <header className="ip-join-top ip-pitch">
        <PitchLines compact />
        <div className="ip-join-top-row">
          <span className="ip-live ip-live-sm"><i className="ip-livedot" />LIVE</span>
          <span className="ip-join-title">{config.title || "INQUIRY PITCH"}</span>
          <span className="ip-myname" title="あなたの名前">#{nickname}</span>
          <button className="ip-link ip-link-light" onClick={onLeave}>EXIT</button>
        </div>
      </header>

      <div className="ip-join-body">
        {ai < 0 ? (
          <div className="ip-join-wait">
            <BouncingBall big />
            <p className="ip-cheer">{CHEERS[cheer]}</p>
            <p className="ip-h2">まもなくキックオフ</p>
            <p className="ip-muted">COACHが問いを出すまで待機中…</p>
          </div>
        ) : (
          <>
            <div className="ip-join-no">INQUIRY {String(ai + 1).padStart(2, "0")} / {String(qs.length).padStart(2, "0")}</div>
            <h2 className="ip-join-qtext">{q.text}</h2>

            {!answered ? (
              <AnswerInput q={q} textDraft={textDraft} setTextDraft={setTextDraft} onSubmit={submit} />
            ) : (
              <div className="ip-thanks">
                <div className="ip-thanks-badge"><SoccerBall size={30} /></div>
                <span className="ip-thanks-en">GREAT SHOT!</span>
                <span className="ip-thanks-jp">回答を送信しました</span>
                {q.type !== "text" && (
                  <button className="ip-link" onClick={() =>
                    setAnswers((p) => { const c = { ...p }; delete c[`${sid}:${ai}`]; return c; })}>
                    回答を変更する
                  </button>
                )}
              </div>
            )}

            {config.revealResults && (
              <div className="ip-join-results">
                <div className="ip-results-label">TEAM RESULT — みんなの回答（{votes.length}）</div>
                <Results q={q} votes={votes} />
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

function AnswerInput({ q, textDraft, setTextDraft, onSubmit }) {
  if (q.type === "choice") {
    return (
      <div className="ip-answer-choices">
        {q.options.map((opt, i) => (
          <button key={i} className="ip-answer-btn" onClick={() => onSubmit(i)}>
            <span className="ip-jersey">{String.fromCharCode(65 + i)}</span>
            <span className="ip-answer-text">{opt}</span>
            <span className="ip-answer-kick">⚽</span>
          </button>
        ))}
      </div>
    );
  }
  if (q.type === "scale") {
    const nums = []; for (let n = q.scaleMin; n <= q.scaleMax; n++) nums.push(n);
    return (
      <div className="ip-scale-answer">
        <div className="ip-scale-btns">
          {nums.map((n) => <button key={n} className="ip-scale-btn" onClick={() => onSubmit(n)}>{n}</button>)}
        </div>
        <div className="ip-scale-ends"><span>{q.minLabel}</span><span>{q.maxLabel}</span></div>
      </div>
    );
  }
  const can = textDraft.trim().length > 0;
  return (
    <div className="ip-text-answer">
      <textarea className="ip-input ip-textarea" rows={3} placeholder="Write your idea — 自由に入力"
        value={textDraft} onChange={(e) => setTextDraft(e.target.value)} />
      <button className="ip-btn-primary ip-btn-block" disabled={!can} onClick={() => onSubmit(textDraft.trim())}>
        SHOOT! 送信
      </button>
    </div>
  );
}

/* ===================== GOAL OVERLAY + CONFETTI ===================== */
function GoalOverlay({ name }) {
  const pieces = useMemo(() => {
    const colors = ["#F4C430", "#1f9a4d", "#E63329", "#2E6FE0", "#ffffff", "#FF8A00"];
    return Array.from({ length: 40 }, () => ({
      left: Math.random() * 100,
      delay: Math.random() * 0.25,
      dur: 1.1 + Math.random() * 0.8,
      bg: colors[(Math.random() * colors.length) | 0],
      rot: Math.random() * 360,
      size: 7 + Math.random() * 8,
      round: Math.random() > 0.6,
    }));
  }, []);
  return (
    <div className="ip-goal-overlay">
      <div className="ip-confetti">
        {pieces.map((p, i) => (
          <span key={i} className="ip-confetto" style={{
            left: `${p.left}%`, animationDelay: `${p.delay}s`, animationDuration: `${p.dur}s`,
            background: p.bg, width: p.size, height: p.size,
            borderRadius: p.round ? "50%" : "2px", transform: `rotate(${p.rot}deg)`,
          }} />
        ))}
      </div>
      <div className="ip-goal-burst">
        <SoccerBall size={62} className="ip-goal-ball" />
        <div className="ip-goal-text">GOAL!!</div>
        <div className="ip-goal-sub">{name ? `GOAL by ${name}!` : "ナイス回答！"}</div>
      </div>
    </div>
  );
}

function BouncingBall({ big }) {
  return (
    <div className={`ip-bounce ${big ? "ip-bounce-big" : ""}`}>
      <SoccerBall size={big ? 60 : 44} className="ip-bounce-ball" />
      <span className="ip-bounce-shadow" />
    </div>
  );
}

/* ===================== RESULTS ===================== */
function Results({ q, votes, big }) {
  if (q.type === "text") return <TextResults votes={votes} big={big} />;
  let labels = [];
  if (q.type === "choice") labels = q.options.map((o, i) => ({ key: i, label: o }));
  else for (let n = q.scaleMin; n <= q.scaleMax; n++) labels.push({ key: n, label: String(n) });
  const counts = labels.map((l) => votes.filter((v) => v.a === l.key).length);
  const total = votes.length || 0;
  const maxC = Math.max(1, ...counts);
  let avg = null;
  if (q.type === "scale" && total > 0) avg = (votes.reduce((s, v) => s + Number(v.a), 0) / total).toFixed(2);

  return (
    <div className={`ip-results ${big ? "ip-results-big" : ""}`}>
      {q.type === "scale" && (
        <div className="ip-avg">AVG <b className="ip-avg-num">{avg ?? "—"}</b>
          {q.minLabel && <span className="ip-avg-ends">{q.minLabel} … {q.maxLabel}</span>}</div>
      )}
      {labels.map((l, i) => {
        const c = counts[i]; const pct = total ? Math.round((c / total) * 100) : 0;
        const names = votes.filter((v) => v.a === l.key).map((v) => v.n).filter(Boolean);
        return (
          <div className="ip-bar-row" key={l.key}>
            <div className="ip-bar-main">
              <div className="ip-bar-label" title={l.label}>
                {q.type === "choice" && <span className="ip-jersey ip-jersey-sm">{String.fromCharCode(65 + i)}</span>}
                <span className="ip-bar-text">{l.label}</span>
              </div>
              <div className="ip-bar-track">
                <div className="ip-bar-fill" style={{ width: `${total ? (c / maxC) * 100 : 0}%` }} />
                <span className="ip-bar-val">{pct}%<span className="ip-bar-count"> ({c})</span></span>
              </div>
            </div>
            {names.length > 0 && (
              <div className="ip-names">
                {names.map((nm, k) => <span className="ip-name-chip" key={k}>{nm}</span>)}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}
function TextResults({ votes, big }) {
  if (!votes.length) return <div className="ip-muted ip-text-empty">まだ回答がありません</div>;
  return (
    <div className={`ip-text-results ${big ? "ip-text-big" : ""}`}>
      {[...votes].reverse().map((v, i) => (
        <div className="ip-text-card" key={i}>
          <span className="ip-text-name">{v.n || "名無し"}</span>
          <span className="ip-text-body">{String(v.a)}</span>
        </div>
      ))}
    </div>
  );
}

.ip-ctrl:hover:not(:disabled){transform:translateY(-2px);}
.ip-ctrl:disabled{opacity:.4;cursor:default;}
.ip-ctrl-toggle{flex:1;font-family:var(--fb);font-weight:700;font-size:13px;color:var(--muted);background:rgba(255,255,255,.78);}
.ip-ctrl-toggle[data-on="true"]{color:var(--grass-dd);}
.ip-ctrl-go{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:var(--ink);margin-left:auto;}
.ip-ctrl-go:hover{background:#ffd23f;}
.ip-ctrl-end{background:var(--ink);color:#fff;margin-left:auto;}

/* ===== PLAYER (join) ===== */
.ip-join{max-width:560px;margin:0 auto;min-height:100vh;}
.ip-join-top{border-radius:0 0 18px 18px;padding:14px 18px 16px;margin-bottom:18px;}
.ip-join-top .ip-lines{opacity:.6;}
.ip-join-top-row{position:relative;z-index:2;display:flex;align-items:center;gap:10px;}
.ip-join-title{flex:1;font-family:var(--fd);letter-spacing:.05em;font-size:15px;color:#fff;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ip-join-body{padding:6px 18px 50px;}
.ip-join-wait{text-align:center;padding:42px 0;}
.ip-cheer{font-family:var(--fd);letter-spacing:.05em;font-size:24px;color:var(--grass-d);margin:18px 0 6px;animation:ip-fade .5s;}
@keyframes ip-fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;}}
.ip-join-no{font-family:var(--fd);letter-spacing:.08em;font-size:13px;color:var(--grass-d);margin-bottom:10px;}
.ip-join-qtext{font-weight:900;font-size:clamp(20px,5.4vw,26px);line-height:1.32;margin:0 0 22px;}
.ip-answer-choices{display:flex;flex-direction:column;gap:11px;}
.ip-answer-btn{display:flex;align-items:center;gap:13px;text-align:left;background:var(--surface);border:2.5px solid var(--line);border-radius:14px;padding:15px 16px;font-family:var(--fb);font-size:16px;font-weight:500;color:var(--ink);cursor:pointer;transition:.14s;}
.ip-answer-btn:hover{border-color:var(--grass);}
.ip-answer-btn:active{transform:scale(.99);}
.ip-answer-text{flex:1;}
.ip-answer-kick{opacity:0;transform:translateX(-6px);transition:.16s;font-size:18px;}
.ip-answer-btn:hover .ip-answer-kick{opacity:1;transform:translateX(0);}
.ip-scale-answer{margin-top:4px;}
.ip-scale-btns{display:flex;gap:8px;}
.ip-scale-btn{flex:1;aspect-ratio:1;background:var(--surface);border:2.5px solid var(--line);border-radius:13px;font-family:var(--fd);font-size:22px;color:var(--ink);cursor:pointer;transition:.14s;}
.ip-scale-btn:hover{border-color:var(--grass);}
.ip-scale-btn:active{transform:scale(.94);background:var(--grass);color:#fff;}
.ip-scale-ends{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--muted);}
.ip-text-answer{margin-top:4px;}
.ip-thanks{display:flex;flex-direction:column;align-items:center;gap:8px;padding:30px 0;text-align:center;}
.ip-thanks-badge{animation:ip-pop .4s cubic-bezier(.2,1.6,.4,1);}
@keyframes ip-pop{from{transform:scale(0);}to{transform:scale(1);}}
.ip-thanks-en{font-family:var(--fd);letter-spacing:.06em;font-size:22px;color:var(--grass-d);}
.ip-thanks-jp{font-weight:500;font-size:14px;color:var(--muted);}
.ip-join-results{margin-top:28px;padding-top:20px;border-top:2px solid var(--line);}
.ip-results-label{font-family:var(--fd);letter-spacing:.06em;font-size:12px;color:var(--muted);margin-bottom:14px;}

/* ===== results bars ===== */
.ip-results{display:flex;flex-direction:column;gap:12px;}
.ip-bar-row{display:flex;flex-direction:column;gap:7px;}
.ip-bar-main{display:flex;align-items:center;gap:14px;}
.ip-results-big .ip-bar-main{gap:18px;}
.ip-bar-label{display:flex;align-items:center;gap:8px;width:30%;max-width:260px;min-width:84px;}
.ip-bar-text{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ip-results-big .ip-bar-text{font-size:19px;}
.ip-bar-track{flex:1;position:relative;height:38px;background:#e7ede8;border-radius:9px;overflow:hidden;display:flex;align-items:center;}
.ip-results-big .ip-bar-track{height:52px;}
.ip-bar-fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--grass-dd),var(--grass));border-radius:9px;transition:width .7s cubic-bezier(.2,.8,.2,1);}
.ip-bar-val{position:relative;margin-left:auto;padding:0 14px;font-family:var(--fd);font-size:16px;color:var(--ink);font-variant-numeric:tabular-nums;}
.ip-results-big .ip-bar-val{font-size:21px;}
.ip-bar-count{color:var(--muted);font-size:.78em;}
.ip-avg{font-family:var(--fd);letter-spacing:.06em;font-size:14px;color:var(--muted);margin-bottom:6px;display:flex;align-items:baseline;gap:8px;}
.ip-avg-num{color:var(--grass-d);font-size:32px;font-variant-numeric:tabular-nums;}
.ip-avg-ends{font-family:var(--fb);font-weight:500;font-size:12px;letter-spacing:0;}
.ip-text-results{display:flex;flex-direction:column;gap:10px;max-height:46vh;overflow:auto;}
.ip-text-big{max-height:52vh;}
.ip-text-card{background:#fff;border:2px solid var(--line);border-left:4px solid var(--grass);border-radius:11px;padding:13px 16px;font-size:15px;line-height:1.55;white-space:pre-wrap;word-break:break-word;}
.ip-text-big .ip-text-card{font-size:18px;}
.ip-text-name{display:block;font-family:var(--fd);letter-spacing:.04em;font-size:12px;color:var(--grass-d);margin-bottom:4px;}
.ip-text-big .ip-text-name{font-size:14px;}
.ip-text-body{display:block;}
.ip-text-empty{padding:24px 0;}

/* name chips under bars */
.ip-names{display:flex;flex-wrap:wrap;gap:5px;padding-left:calc(30% + 14px);}
.ip-results-big .ip-names{padding-left:0;}
.ip-name-chip{background:#eef4ef;border:1px solid var(--line);color:var(--grass-dd);font-size:12px;font-weight:500;padding:2px 9px;border-radius:999px;}
.ip-results-big .ip-name-chip{font-size:14px;padding:3px 11px;}

/* my name badge */
.ip-myname{font-family:var(--fb);font-weight:700;font-size:12px;color:#fff;background:rgba(0,0,0,.28);padding:4px 10px;border-radius:999px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* registration */
.ip-reg{text-align:center;padding:18px 0 40px;}
.ip-reg-jersey{position:relative;width:140px;height:158px;margin:8px auto 22px;background:linear-gradient(160deg,#1f9a4d,#0f5f2e);border-radius:14px 14px 8px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;box-shadow:0 16px 34px -18px rgba(15,95,46,.8);clip-path:polygon(0 14%,18% 0,38% 8%,62% 8%,82% 0,100% 14%,100% 100%,0 100%);}
.ip-reg-jersey-no{font-family:var(--fd);font-size:62px;line-height:1;}
.ip-reg-jersey-name{font-family:var(--fd);letter-spacing:.06em;font-size:13px;margin-top:6px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 8px;}
.ip-reg-input{text-align:center;margin:16px 0 4px;}

/* ===== ball / bounce / goal ===== */
.ip-ball{display:block;}
.ip-ball-spin{animation:ip-spin 1.1s linear infinite;}
@keyframes ip-spin{to{transform:rotate(360deg);}}
.ip-bounce{position:relative;width:70px;height:80px;}
.ip-bounce-big{width:90px;height:100px;margin:0 auto;}
.ip-bounce-ball{animation:ip-bounce 1s cubic-bezier(.3,0,.4,1) infinite;}
@keyframes ip-bounce{0%,100%{transform:translateY(-26px) rotate(0);}50%{transform:translateY(6px) rotate(180deg);}}
.ip-bounce-shadow{position:absolute;left:50%;bottom:4px;width:46px;height:9px;background:rgba(0,0,0,.18);border-radius:50%;transform:translateX(-50%);animation:ip-shadow 1s cubic-bezier(.3,0,.4,1) infinite;}
@keyframes ip-shadow{0%,100%{transform:translateX(-50%) scale(.7);opacity:.4;}50%{transform:translateX(-50%) scale(1.1);opacity:.8;}}

.ip-goal-overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.ip-goal-burst{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:6px;animation:ip-goalpop .5s cubic-bezier(.2,1.5,.4,1) both;}
@keyframes ip-goalpop{0%{transform:scale(.2);opacity:0;}60%{transform:scale(1.12);opacity:1;}100%{transform:scale(1);}}
.ip-goal-ball{animation:ip-spin .6s linear infinite;}
.ip-goal-text{font-family:var(--fd);font-size:clamp(52px,14vw,108px);color:var(--gold);letter-spacing:.04em;text-shadow:0 6px 0 var(--grass-dd),0 12px 30px rgba(0,0,0,.4);-webkit-text-stroke:2px var(--ink);}
.ip-goal-sub{font-family:var(--fd);letter-spacing:.1em;font-size:18px;color:#fff;background:var(--red);padding:5px 16px;border-radius:8px;}
.ip-confetti{position:absolute;inset:0;overflow:hidden;}
.ip-confetto{position:absolute;top:-20px;animation-name:ip-fall;animation-timing-function:cubic-bezier(.3,.1,.6,1);animation-fill-mode:both;}
@keyframes ip-fall{0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(105vh) rotate(680deg);opacity:.9;}}

@media (prefers-reduced-motion: reduce){
  .ip-root *{animation:none!important;transition:none!important;}
  .ip-confetto{display:none;}
}
    `}</style>
  );
}
