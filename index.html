.ip-text-name{display:block;font-family:var(--fd);letter-spacing:.04em;font-size:12px;color:var(--grass-d);margin-bottom:4px;}
.ip-text-big .ip-text-name{font-size:14px;}
.ip-text-body{display:block;}
.ip-text-empty{padding:24px 0;}

/* name chips under bars */
.ip-names{display:flex;flex-wrap:wrap;gap:5px;padding-left:calc(30% + 14px);}
.ip-results-big .ip-names{padding-left:0;}
.ip-name-chip{background:#eef4ef;border:1px solid var(--line);color:var(--grass-dd);font-size:12px;font-weight:500;padding:2px 9px;border-radius:999px;}
.ip-results-big .ip-name-chip{font-size:14px;padding:3px 11px;}

/* my name badge */
.ip-myname{font-family:var(--fb);font-weight:700;font-size:12px;color:#fff;background:rgba(0,0,0,.28);padding:4px 10px;border-radius:999px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* registration */
.ip-reg{text-align:center;padding:18px 0 40px;}
.ip-reg-jersey{position:relative;width:140px;height:158px;margin:8px auto 22px;background:linear-gradient(160deg,#1f9a4d,#0f5f2e);border-radius:14px 14px 8px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;box-shadow:0 16px 34px -18px rgba(15,95,46,.8);clip-path:polygon(0 14%,18% 0,38% 8%,62% 8%,82% 0,100% 14%,100% 100%,0 100%);}
.ip-reg-jersey-no{font-family:var(--fd);font-size:62px;line-height:1;}
.ip-reg-jersey-name{font-family:var(--fd);letter-spacing:.06em;font-size:13px;margin-top:6px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 8px;}
.ip-reg-input{text-align:center;margin:16px 0 4px;}

/* ===== ball / bounce / goal ===== */
.ip-ball{display:block;}
.ip-ball-spin{animation:ip-spin 1.1s linear infinite;}
@keyframes ip-spin{to{transform:rotate(360deg);}}
.ip-bounce{position:relative;width:70px;height:80px;}
.ip-bounce-big{width:90px;height:100px;margin:0 auto;}
.ip-bounce-ball{animation:ip-bounce 1s cubic-bezier(.3,0,.4,1) infinite;}
@keyframes ip-bounce{0%,100%{transform:translateY(-26px) rotate(0);}50%{transform:translateY(6px) rotate(180deg);}}
.ip-bounce-shadow{position:absolute;left:50%;bottom:4px;width:46px;height:9px;background:rgba(0,0,0,.18);border-radius:50%;transform:translateX(-50%);animation:ip-shadow 1s cubic-bezier(.3,0,.4,1) infinite;}
@keyframes ip-shadow{0%,100%{transform:translateX(-50%) scale(.7);opacity:.4;}50%{transform:translateX(-50%) scale(1.1);opacity:.8;}}

.ip-goal-overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.ip-goal-burst{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:6px;animation:ip-goalpop .5s cubic-bezier(.2,1.5,.4,1) both;}
@keyframes ip-goalpop{0%{transform:scale(.2);opacity:0;}60%{transform:scale(1.12);opacity:1;}100%{transform:scale(1);}}
.ip-goal-ball{animation:ip-spin .6s linear infinite;}
.ip-goal-text{font-family:var(--fd);font-size:clamp(52px,14vw,108px);color:var(--gold);letter-spacing:.04em;text-shadow:0 6px 0 var(--grass-dd),0 12px 30px rgba(0,0,0,.4);-webkit-text-stroke:2px var(--ink);}
.ip-goal-sub{font-family:var(--fd);letter-spacing:.1em;font-size:18px;color:#fff;background:var(--red);padding:5px 16px;border-radius:8px;}
.ip-confetti{position:absolute;inset:0;overflow:hidden;}
.ip-confetto{position:absolute;top:-20px;animation-name:ip-fall;animation-timing-function:cubic-bezier(.3,.1,.6,1);animation-fill-mode:both;}
@keyframes ip-fall{0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(105vh) rotate(680deg);opacity:.9;}}

/* ===== INTERSTITIAL（問いと問いの間） ===== */
.ip-inter{position:relative;border-radius:20px;overflow:hidden;min-height:60vh;display:flex;align-items:center;justify-content:center;box-shadow:0 26px 60px -30px rgba(0,0,0,.6);animation:ip-inter-in .4s ease;}
@keyframes ip-inter-in{from{opacity:0;transform:scale(.98);}to{opacity:1;}}
.ip-inter-inner{position:relative;z-index:2;text-align:center;color:#fff;padding:34px 22px;width:100%;}
.ip-inter-eyebrow{font-family:var(--fd);letter-spacing:.22em;font-size:14px;color:var(--gold);}
.ip-inter-no{font-family:var(--fd);font-size:20px;color:rgba(255,255,255,.85);margin-top:2px;}
.ip-inter-no-num{font-size:clamp(46px,16vw,64px);color:#fff;margin:0 6px;}
.ip-inter-no-total{font-size:18px;color:rgba(255,255,255,.6);}
.ip-inter-pitch{position:relative;height:72px;margin:14px 0 6px;overflow:hidden;}
.ip-inter-grass-line{position:absolute;left:6%;right:6%;bottom:14px;height:3px;background:rgba(255,255,255,.45);border-radius:2px;}
.ip-inter-roller{position:absolute;bottom:8px;left:-14%;animation:ip-roll 2.4s linear infinite;}
@keyframes ip-roll{0%{left:-14%;}100%{left:106%;}}
.ip-inter-msg{font-family:var(--fd);font-size:clamp(24px,7vw,34px);margin:8px 0 2px;letter-spacing:.02em;}
.ip-inter-sub{color:rgba(255,255,255,.8);font-size:13px;margin:0;}
.ip-inter-dots{display:flex;gap:8px;justify-content:center;margin-top:16px;}
.ip-inter-dots i{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.9);animation:ip-dot 1.2s infinite;}
.ip-inter-dots i:nth-child(2){animation-delay:.2s;}
.ip-inter-dots i:nth-child(3){animation-delay:.4s;}
@keyframes ip-dot{0%,100%{opacity:.3;transform:translateY(0);}50%{opacity:1;transform:translateY(-5px);}}

/* ===== TEAMS / SCORE / GOAL ===== */
.ip-team-label{font-family:var(--fd);letter-spacing:.06em;font-size:11px;color:var(--muted);margin:16px 0 8px;}
.ip-team-pick{display:flex;gap:12px;margin-bottom:6px;}
.ip-team-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:14px 8px;border-radius:14px;border:2.5px solid var(--line);background:#fff;cursor:pointer;transition:.15s;}
.ip-team-flag{font-size:30px;line-height:1.1;}
.ip-team-name{font-weight:700;font-size:15px;}
.ip-team-sub{font-family:var(--fd);font-size:10px;letter-spacing:.1em;color:var(--muted);}
.ip-team-jp.on{border-color:#1763C7;background:#eaf2fe;box-shadow:0 0 0 3px rgba(23,99,199,.16);}
.ip-team-br.on{border-color:#caa900;background:#fffbe6;box-shadow:0 0 0 3px rgba(247,208,0,.28);}
.ip-reg-jersey-jp{background:linear-gradient(160deg,#2E6FE0,#10357f)!important;}
.ip-reg-jersey-br{background:linear-gradient(160deg,#F7D000,#0f7a3a)!important;}
.ip-reg-jersey-br .ip-reg-jersey-no,.ip-reg-jersey-br .ip-reg-jersey-name{color:#0b1411;}

.ip-scorestrip{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;background:rgba(11,20,17,.82);border-radius:10px;padding:6px 12px;color:#fff;}
.ip-ss-team{font-weight:700;font-size:12px;}
.ip-ss-jp{color:#9ec3ff;}
.ip-ss-br{color:#ffe766;}
.ip-ss-num{font-family:var(--fd);font-size:22px;min-width:20px;text-align:center;font-variant-numeric:tabular-nums;}
.ip-ss-dash{opacity:.5;}
.ip-myname-jp{background:rgba(23,99,199,.5);}
.ip-myname-br{background:rgba(202,169,0,.55);}

.ip-sb-match{display:flex;align-items:center;gap:12px;color:#fff;}
.ip-sbm-team{font-weight:700;font-size:13px;}
.ip-sbm-jp{color:#9ec3ff;}
.ip-sbm-br{color:#ffe766;}
.ip-sbm-score{font-family:var(--fd);font-size:30px;letter-spacing:.02em;font-variant-numeric:tabular-nums;}
.ip-sbm-dash{margin:0 8px;opacity:.55;}

.ip-goal-banner{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:60;display:flex;align-items:center;gap:12px;padding:12px 22px;border-radius:14px;color:#fff;box-shadow:0 14px 30px -10px rgba(0,0,0,.5);animation:ip-gb-in .4s cubic-bezier(.2,1.4,.4,1);}
@keyframes ip-gb-in{from{transform:translate(-50%,-30px);opacity:0;}to{transform:translate(-50%,0);opacity:1;}}
.ip-goal-banner-jp{background:linear-gradient(120deg,#1763C7,#0f3f8f);}
.ip-goal-banner-br{background:linear-gradient(120deg,#F7D000,#0f7a3a);color:#0b1411;}
.ip-gb-flag{font-size:26px;}
.ip-gb-text{font-family:var(--fd);font-size:24px;letter-spacing:.04em;}
.ip-gb-sub{font-weight:700;font-size:14px;opacity:.95;}

.ip-goal-jp .ip-goal-text{color:#5aa9ff;}
.ip-goal-br .ip-goal-text{color:#FFD400;}
.ip-goal-flag{font-size:54px;line-height:1;margin-bottom:2px;animation:ip-pop .4s cubic-bezier(.2,1.6,.4,1);}

.ip-save-burst{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:6px;animation:ip-goalpop .4s cubic-bezier(.2,1.5,.4,1) both;}
.ip-save-ball{font-size:54px;animation:ip-save-bounce .6s ease;}
@keyframes ip-save-bounce{0%{transform:translateY(-30px) scale(.8);}60%{transform:translateY(6px) scale(1.05);}100%{transform:translateY(0) scale(1);}}
.ip-save-text{font-family:var(--fd);font-size:clamp(40px,11vw,72px);color:#fff;-webkit-text-stroke:2px var(--ink);}
.ip-save-sub{font-family:var(--fd);letter-spacing:.06em;font-size:15px;color:#fff;background:rgba(11,20,17,.7);padding:5px 14px;border-radius:8px;}

@media (prefers-reduced-motion: reduce){
  .ip-root *{animation:none!important;transition:none!important;}
  .ip-confetto{display:none;}
}
